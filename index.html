<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="theme-color" content="#000000">

  <link rel="shortcut icon" href="./favicon.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8/themes/satellite-min.css">
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@algolia/autocomplete-theme-classic@1.11.0/dist/theme.min.css"> -->
  <link rel="stylesheet" href="./src/index.css">
  <link rel="stylesheet" href="./src/app.css">
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8/themes/satellite-min.css"> -->
  <title>indexing-assignment-frontend</title>
</head>

<body>
  <div class="ais-InstantSearch">
    <h1>Spencer and Williams</h1>

    <div class="layout">
      <div class="left-panel">
        <h2>Refine your search</h2>
        <div id="clear-refinements"></div>
        <h3>Delivery</h3>
        <div id="free-shipping"></div>
        <h3>Categories</h3>
        <div id="hierarchical-categories"></div>
        <h3>Rating</h3>
        <div id="rating"></div>
        <h3>Price</h3>
        <div id="numeric-menu"></div>
        <h3>Brands</h3>
        <div id="brand-list"></div>
      </div>

      <div class="right-panel">
        <div id="searchbox"></div>
        <div id="stats"></div>
        <div id="hits"></div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.10.5/dist/algoliasearch-lite.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.95.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@algolia/autocomplete-js@1.19.8/dist/umd/index.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@algolia/autocomplete-plugin-query-suggestions@1.19.8/dist/umd/index.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@algolia/autocomplete-plugin-recent-searches@1.19.8/dist/umd/index.production.min.js"></script>
  <script src="./src/app.js"></script>
</body>

</html>
